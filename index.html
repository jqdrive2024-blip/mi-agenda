<title>Mi Agenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede8;
  --text2: #888580;
  --text3: #555250;
  --accent: #e8631a;
  --accent2: #ff8c4a;
  --green: #4ade80;
  --red: #f87171;
  --blue: #60a5fa;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; overscroll-behavior: none; }

/* Layout */
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }
.topbar { padding: 56px 20px 16px; background: var(--bg); border-bottom: 1px solid var(--border); position: relative; z-index: 10; }
.topbar-row { display: flex; align-items: flex-end; justify-content: space-between; }
.topbar-title { font-size: 26px; font-weight: 500; letter-spacing: -0.5px; }
.topbar-title span { color: var(--accent); }
.topbar-date { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; margin-top: 3px; }
.notif-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: background .2s; }
.notif-btn:hover { background: var(--border2); }

.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px 0; }
.section { display: none; padding-bottom: 100px; }
.section.active { display: block; }

/* Nav */
.nav { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(15,15,15,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); display: flex; z-index: 100; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 4px; background: none; border: none; cursor: pointer; color: var(--text3); transition: color .2s; font-family: 'DM Sans', sans-serif; }
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 20px; }
.nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; }

/* Cards */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.card-title { font-size: 11px; font-weight: 500; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
.stat-num { font-size: 28px; font-weight: 300; color: var(--text); font-family: 'DM Mono', monospace; line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--text2); margin-top: 4px; letter-spacing: 0.5px; }
.stat.accent .stat-num { color: var(--accent); }

/* Tasks */
.task-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .15s; }
.task-item:last-child { border-bottom: none; }
.task-item:active { opacity: .7; }
.task-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
.task-check.done { background: var(--green); border-color: var(--green); color: #000; font-size: 11px; font-weight: 600; }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-text.done { text-decoration: line-through; color: var(--text3); }
.task-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.task-tag { font-size: 10px; padding: 1px 7px; border-radius: 20px; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.task-tag.urgente { background: rgba(232,99,26,0.12); color: var(--accent2); border-color: rgba(232,99,26,0.2); }
.task-date { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.task-del { font-size: 16px; color: var(--text3); padding: 4px; opacity: 0; transition: opacity .2s; }
.task-item:hover .task-del { opacity: 1; }

/* Input */
.input-wrap { display: flex; gap: 8px; margin-top: 10px; }
.input-wrap input, .input-wrap select { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s; }
.input-wrap input:focus, .input-wrap select:focus { border-color: var(--accent); }
.input-wrap input::placeholder { color: var(--text3); }
.input-wrap select option { background: var(--bg3); }
.btn-add { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 16px; font-size: 18px; cursor: pointer; font-weight: 300; transition: background .2s, transform .1s; flex-shrink: 0; }
.btn-add:active { transform: scale(.95); background: var(--accent2); }

/* Alarms */
.alarm-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.alarm-item:last-child { border-bottom: none; }
.alarm-time { font-size: 28px; font-weight: 300; font-family: 'DM Mono', monospace; color: var(--text); min-width: 80px; line-height: 1; }
.alarm-time.off { color: var(--text3); }
.alarm-info { flex: 1; }
.alarm-desc { font-size: 14px; color: var(--text); }
.alarm-status { font-size: 11px; color: var(--text3); margin-top: 1px; }
.toggle { width: 44px; height: 26px; border-radius: 13px; background: var(--bg3); border: 1px solid var(--border2); position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
.toggle.on { background: var(--accent); border-color: var(--accent); }
.toggle::after { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; background: white; top: 2px; left: 2px; transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
.toggle.on::after { left: 20px; }

/* Calendar */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-nav-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; color: var(--text2); cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; }
.cal-month { font-size: 15px; font-weight: 500; color: var(--text); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-hdr { font-size: 10px; color: var(--text3); text-align: center; padding: 4px 0; letter-spacing: 0.5px; }
.cal-day { font-size: 13px; text-align: center; padding: 7px 2px; border-radius: 6px; cursor: pointer; position: relative; color: var(--text2); transition: background .15s; font-family: 'DM Mono', monospace; }
.cal-day:hover { background: var(--bg3); }
.cal-day.today { background: var(--accent); color: white; font-weight: 500; }
.cal-day.has-ev::after { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--accent2); position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%); }
.cal-day.today.has-ev::after { background: white; }
.cal-day.other-month { color: var(--text3); opacity: .4; }
.event-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.event-item:last-child { border-bottom: none; }
.event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.event-info { flex: 1; }
.event-info p { font-size: 14px; color: var(--text); }
.event-info span { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

/* Resources */
.resource-item { margin-bottom: 14px; }
.resource-item:last-child { margin-bottom: 0; }
.resource-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.resource-name { font-size: 13px; color: var(--text); }
.resource-vals { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }
.resource-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.resource-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }

/* Notif banner */
.notif-banner { background: rgba(232,99,26,0.08); border: 1px solid rgba(232,99,26,0.2); border-radius: var(--radius-sm); padding: 11px 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.notif-banner p { font-size: 12px; color: rgba(232,99,26,0.9); flex: 1; line-height: 1.4; }
.notif-banner button { background: var(--accent); color: white; border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; }

/* Loading */
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text3); font-size: 13px; gap: 8px; }
.spinner { width: 16px; height: 16px; border: 1.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty state */
.empty { text-align: center; padding: 32px 20px; color: var(--text3); font-size: 13px; line-height: 1.6; }
.empty-icon { font-size: 32px; margin-bottom: 8px; }

/* Animations */
@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
.card { animation: fadeIn .25s ease both; }
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDCrejvsHkIPILM1_ao4M1n7K8X6mb2IA0",
  authDomain: "agenda-ia-26cf0.firebaseapp.com",
  projectId: "agenda-ia-26cf0",
  storageBucket: "agenda-ia-26cf0.firebasestorage.app",
  messagingSenderId: "12441506230",
  appId: "1:12441506230:web:68dc7fe3385b580847b117"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── Colecciones ──
const TAREAS = 'tareas';
const ALARMAS = 'alarmas';
const EVENTOS = 'eventos';
const RECURSOS = 'recursos';

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS = ['L','M','X','J','V','S','D'];
const COLORES = ['#e8631a','#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444'];
const today = new Date();
let calMes = today.getMonth();
let calAnio = today.getFullYear();

// ── Fecha topbar ──
const opciones = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
document.getElementById('fecha-hoy').textContent = today.toLocaleDateString('es-ES', opciones);

// ── Inicializar fecha evento ──
const hoyStr = today.toISOString().split('T')[0];
document.getElementById('nuevo-evento-fecha').value = hoyStr;

// ── Tabs ──
window.showTab = function(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if (id === 'calendario') renderCalendario();
};

// ══════════════════════════════
// TAREAS
// ══════════════════════════════
let tareasData = [];

onSnapshot(query(collection(db, TAREAS), orderBy('creado', 'desc')), snap => {
  tareasData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderTareas();
  renderInicio();
});

function renderTareas() {
  const el = document.getElementById('lista-tareas');
  if (!tareasData.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>No hay faenas. ¡Añade la primera!</div>';
    return;
  }
  el.innerHTML = tareasData.map(t => `
    <div class="task-item" onclick="toggleTarea('${t.id}', ${t.hecho})">
      <div class="task-check ${t.hecho ? 'done' : ''}">${t.hecho ? '✓' : ''}</div>
      <div class="task-body">
        <div class="task-text ${t.hecho ? 'done' : ''}">${t.texto}</div>
        <div class="task-meta">
          <span class="task-tag ${t.tag === 'Urgente' ? 'urgente' : ''}">${t.tag || 'Trabajo'}</span>
          <span class="task-date">${t.fecha || ''}</span>
        </div>
      </div>
      <span class="task-del" onclick="event.stopPropagation();delTarea('${t.id}')">×</span>
    </div>`).join('');
}

window.toggleTarea = async function(id, hecho) {
  await updateDoc(doc(db, TAREAS, id), { hecho: !hecho });
};

window.addTarea = async function() {
  const inp = document.getElementById('nueva-tarea');
  const tag = document.getElementById('tarea-tag').value;
  const v = inp.value.trim();
  if (!v) return;
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const fecha = dias[today.getDay()];
  await addDoc(collection(db, TAREAS), { texto: v, hecho: false, tag, fecha, creado: Date.now() });
  inp.value = '';
};

window.delTarea = async function(id) {
  await deleteDoc(doc(db, TAREAS, id));
};

// ══════════════════════════════
// ALARMAS
// ══════════════════════════════
let alarmasData = [];

onSnapshot(query(collection(db, ALARMAS), orderBy('hora')), snap => {
  alarmasData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderAlarmas();
  renderInicio();
  alarmasData.filter(a => a.on).forEach(programarAlarma);
});

function renderAlarmas() {
  const el = document.getElementById('lista-alarmas');
  if (!alarmasData.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⏰</div>No hay alarmas. ¡Añade una!</div>';
    return;
  }
  el.innerHTML = alarmasData.map(a => `
    <div class="alarm-item">
      <div class="alarm-time ${a.on ? '' : 'off'}">${a.hora}</div>
      <div class="alarm-info">
        <div class="alarm-desc">${a.desc}</div>
        <div class="alarm-status">${a.on ? 'Activa' : 'Desactivada'}</div>
      </div>
      <button class="toggle ${a.on ? 'on' : ''}" onclick="toggleAlarma('${a.id}', ${a.on})"></button>
      <span style="color:var(--text3);cursor:pointer;padding:4px;font-size:16px" onclick="delAlarma('${a.id}')">×</span>
    </div>`).join('');
}

window.toggleAlarma = async function(id, on) {
  await updateDoc(doc(db, ALARMAS, id), { on: !on });
};

window.addAlarma = async function() {
  const h = document.getElementById('nueva-hora').value;
  const d = document.getElementById('nueva-alarma-desc').value.trim();
  if (!h || !d) return;
  await addDoc(collection(db, ALARMAS), { hora: h, desc: d, on: true, creado: Date.now() });
  document.getElementById('nueva-hora').value = '';
  document.getElementById('nueva-alarma-desc').value = '';
};

window.delAlarma = async function(id) {
  await deleteDoc(doc(db, ALARMAS, id));
};

function programarAlarma(a) {
  if (!a.on || !('Notification' in window) || Notification.permission !== 'granted') return;
  const [hh, mm] = a.hora.split(':').map(Number);
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hh, mm, 0);
  let diff = target - now;
  if (diff < 0) diff += 86400000;
  setTimeout(() => {
    if (Notification.permission === 'granted') {
      new Notification('⏰ ' + a.desc, { body: 'Mi Agenda · ' + a.hora, icon: '' });
    }
  }, diff);
}

// ══════════════════════════════
// EVENTOS / CALENDARIO
// ══════════════════════════════
let eventosData = [];

onSnapshot(query(collection(db, EVENTOS), orderBy('fecha')), snap => {
  eventosData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderCalendario();
  renderEventos();
});

window.cambiarMes = function(dir) {
  calMes += dir;
  if (calMes > 11) { calMes = 0; calAnio++; }
  if (calMes < 0) { calMes = 11; calAnio--; }
  renderCalendario();
};

function renderCalendario() {
  document.getElementById('cal-titulo').textContent = MESES[calMes] + ' ' + calAnio;
  document.getElementById('cal-hdrs').innerHTML = DIAS.map(d => `<div class="cal-hdr">${d}</div>`).join('');
  const firstDay = new Date(calAnio, calMes, 1).getDay();
  const offset = (firstDay + 6) % 7;
  const daysInMonth = new Date(calAnio, calMes + 1, 0).getDate();
  const evDias = new Set(eventosData.filter(e => {
    const [y, m] = (e.fecha || '').split('-').map(Number);
    return y === calAnio && m === calMes + 1;
  }).map(e => parseInt(e.fecha.split('-')[2])));
  let html = '';
  for (let i = 0; i < offset; i++) html += '<div></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && calMes === today.getMonth() && calAnio === today.getFullYear();
    const hasEv = evDias.has(d);
    html += `<div class="cal-day ${isToday ? 'today' : ''} ${hasEv ? 'has-ev' : ''}">${d}</div>`;
  }
  document.getElementById('cal-days').innerHTML = html;
}

function renderEventos() {
  const el = document.getElementById('lista-eventos');
  if (!eventosData.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📅</div>No hay eventos.</div>';
    return;
  }
  el.innerHTML = eventosData.map((e, i) => `
    <div class="event-item">
      <div class="event-dot" style="background:${COLORES[i % COLORES.length]}"></div>
      <div class="event-info">
        <p>${e.desc}</p>
        <span>${e.fecha || ''}${e.hora ? ' · ' + e.hora : ''}</span>
      </div>
      <span style="color:var(--text2);cursor:pointer;padding:4px;font-size:13px;margin-right:2px" onclick="editEvento('${e.id}','${e.desc}','${e.fecha||''}','${e.hora||''}')">✏️</span>
      <span style="color:var(--text3);cursor:pointer;padding:4px;font-size:16px" onclick="delEvento('${e.id}')">×</span>
    </div>`).join('');
}

window.addEvento = async function() {
  const fecha = document.getElementById('nuevo-evento-fecha').value;
  const hora = document.getElementById('nuevo-evento-hora').value;
  const desc = document.getElementById('nuevo-evento-desc').value.trim();
  if (!desc) return;
  await addDoc(collection(db, EVENTOS), { desc, fecha: fecha || hoyStr, hora: hora || '', creado: Date.now() });
  document.getElementById('nuevo-evento-desc').value = '';
  document.getElementById('nuevo-evento-hora').value = '';
};

window.delEvento = async function(id) {
  await deleteDoc(doc(db, EVENTOS, id));
};

window.editEvento = async function(id, desc, fecha, hora) {
  const nuevoDesc = prompt('Descripción:', desc);
  if (nuevoDesc === null) return;
  const nuevaFecha = prompt('Fecha (YYYY-MM-DD):', fecha);
  if (nuevaFecha === null) return;
  const nuevaHora = prompt('Hora (HH:MM), deja vacío si no tiene hora:', hora);
  if (nuevaHora === null) return;
  await updateDoc(doc(db, EVENTOS, id), {
    desc: nuevoDesc.trim() || desc,
    fecha: nuevaFecha.trim() || fecha,
    hora: nuevaHora.trim()
  });
};

// ══════════════════════════════
// RECURSOS
// ══════════════════════════════
let recursosData = [];

onSnapshot(collection(db, RECURSOS), snap => {
  recursosData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderRecursos();
});

function renderRecursos() {
  const el = document.getElementById('lista-recursos');
  if (!recursosData.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📦</div>No hay recursos. ¡Añade uno!</div>';
    return;
  }
  el.innerHTML = recursosData.map((r, i) => {
    const pct = Math.min(100, Math.round((r.usado / r.total) * 100));
    const color = pct > 85 ? '#ef4444' : pct > 60 ? '#f59e0b' : COLORES[i % COLORES.length];
    return `
    <div class="resource-item">
      <div class="resource-header">
        <span class="resource-name">${r.nombre}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="resource-vals">${r.usado} / ${r.total} (${pct}%)</span>
          <span style="color:var(--text2);cursor:pointer;font-size:13px" onclick="editRecurso('${r.id}','${r.nombre}',${r.usado},${r.total})">✏️</span>
          <span style="color:var(--text3);cursor:pointer;font-size:15px" onclick="delRecurso('${r.id}')">×</span>
        </div>
      </div>
      <div class="resource-bar">
        <div class="resource-fill" style="width:${pct}%;background:${color}"></div>
      </div>
    </div>`;
  }).join('');
}

window.addRecurso = async function() {
  const nombre = prompt('Nombre del recurso (ej: Presupuesto, Horas):');
  if (!nombre) return;
  const total = parseFloat(prompt('Cantidad total:'));
  if (isNaN(total)) return;
  const usado = parseFloat(prompt('Cantidad usada (0 para empezar):') || '0');
  await addDoc(collection(db, RECURSOS), { nombre, total, usado: isNaN(usado) ? 0 : usado, creado: Date.now() });
};

window.editRecurso = async function(id, nombre, usado, total) {
  const nuevoNombre = prompt('Nombre del recurso:', nombre);
  if (nuevoNombre === null) return;
  const nuevoTotal = parseFloat(prompt('Cantidad total:', total));
  if (isNaN(nuevoTotal)) return;
  const nuevoUsado = parseFloat(prompt('Cantidad usada:', usado));
  if (isNaN(nuevoUsado)) return;
  await updateDoc(doc(db, RECURSOS, id), {
    nombre: nuevoNombre.trim() || nombre,
    total: nuevoTotal,
    usado: nuevoUsado
  });
};

window.delRecurso = async function(id) {
  if (!confirm('¿Eliminar este recurso?')) return;
  await deleteDoc(doc(db, RECURSOS, id));
};

// ══════════════════════════════
// RESUMEN INICIO
// ══════════════════════════════
function renderInicio() {
  const pend = tareasData.filter(t => !t.hecho).length;
  const hoy = tareasData.filter(t => !t.hecho && (t.fecha === 'Lun' || t.fecha === 'Mar' || t.fecha === 'Mié' || t.fecha === 'Jue' || t.fecha === 'Vie' || t.fecha === 'Sáb' || t.fecha === 'Dom')).length;
  const done = tareasData.filter(t => t.hecho).length;
  document.getElementById('s-pend').textContent = pend;
  document.getElementById('s-hoy').textContent = tareasData.filter(t => !t.hecho).length;
  document.getElementById('s-done').textContent = done;

  const rt = document.getElementById('resumen-tareas');
  const proximas = tareasData.filter(t => !t.hecho).slice(0, 4);
  rt.innerHTML = proximas.length ? proximas.map(t => `
    <div class="task-item" style="cursor:default">
      <div class="task-check"></div>
      <div class="task-body">
        <div class="task-text">${t.texto}</div>
        <div class="task-meta">
          <span class="task-tag ${t.tag === 'Urgente' ? 'urgente' : ''}">${t.tag || 'Trabajo'}</span>
        </div>
      </div>
    </div>`).join('') : '<div class="empty"><div class="empty-icon">✅</div>¡Todo al día!</div>';

  const ra = document.getElementById('resumen-alarmas');
  const activas = alarmasData.filter(a => a.on).slice(0, 3);
  ra.innerHTML = activas.length ? activas.map(a => `
    <div class="alarm-item" style="padding:8px 0">
      <div class="alarm-time" style="font-size:20px">${a.hora}</div>
      <div class="alarm-info"><div class="alarm-desc" style="font-size:13px">${a.desc}</div></div>
    </div>`).join('') : '<div class="empty" style="padding:12px">No hay alarmas activas</div>';
}

// ══════════════════════════════
// NOTIFICACIONES
// ══════════════════════════════
window.pedirNotif = async function() {
  if (!('Notification' in window)) { alert('Las notificaciones no están disponibles en este navegador.'); return; }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    document.getElementById('notif-banner').style.display = 'none';
    new Notification('Mi Agenda activada ✓', { body: 'Recibirás alertas en todos tus dispositivos Apple.' });
    alarmasData.filter(a => a.on).forEach(programarAlarma);
  }
};

if (Notification.permission === 'granted') {
  document.getElementById('notif-banner').style.display = 'none';
}

// Render inicial calendario
renderCalendario();
</script>

</html>
